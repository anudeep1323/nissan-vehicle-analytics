name: Nissan ML CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install \
          xgboost==2.0.3 \
          scikit-learn==1.4.0 \
          pandas==2.1.4 \
          numpy==1.26.3 \
          mlflow==2.10.0 \
          fastapi==0.109.0 \
          httpx==0.26.0 \
          pytest==7.4.0 \
          evidently==0.4.22

    - name: Run unit tests
      run: pytest tests/ -v

    - name: Lint check
      run: |
        pip install flake8
        flake8 src/ --max-line-length=120 --ignore=E501,W503,W291,W292,W504,F405,F403,E402,E128 --exclude=__pycache__
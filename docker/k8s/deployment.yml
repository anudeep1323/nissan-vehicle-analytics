apiVersion: apps/v1
kind: Deployment
metadata:
  name: nissan-api
  labels:
    app: nissan-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nissan-api
  template:
    metadata:
      labels:
        app: nissan-api
    spec:
      containers:
      - name: nissan-api
        image: nissan-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nissan-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nissan-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70